services:
  postgres:
    image: postgres:16-alpine
    container_name: flowdesk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: flowdesk
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flowdesk_network

  redis:
    image: redis:7-alpine
    container_name: flowdesk_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - flowdesk_network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: flowdesk_redis_commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis
    networks:
      - flowdesk_network

volumes:
  postgres_data:
  redis_data:

networks:
  flowdesk_network:
    driver: bridge
